<section id="category">
  <div class="container p-3 p-md-5">
    <app-message></app-message>

    <!-- Loading Spinner -->
    <div *ngIf="!category" class="text-center mt-5">
      <div class="spinner"></div>
    </div>

    <!-- No Products Message -->
    <h3 *ngIf="category && !category.products.length" 
        class="display-2 text-center mt-5" style="color: #4a0080;">
      No Products in this Category Yet
    </h3>

    <!-- Products List -->
    <div *ngIf="category && category.products.length">
      
      <!-- Category Header -->
      <div class="text-center mb-4">
        <h2 style="color: #4a0080; font-weight: 700;">
          🏔️ {{ category.categoryName }}
        </h2>
        <p class="text-muted">{{ lower }}-{{ upper }} of {{ category.totalProducts }} products</p>
        <hr style="border-color: #7b2ff7; width: 100px;">
      </div>

      <!-- Products Grid -->
      <div class="row">
        <div *ngFor="let product of category.products" class="col-md-4 mb-4">
          <a routerLink="/product/{{ product._id }}" class="text-decoration-none">
            <div class="card h-100">
              <img [src]="product.image" alt="{{ product.title }}" 
                   class="card-img-top" style="height: 200px; object-fit: cover;">
              <div class="card-body">
                <h5 class="card-title" style="color: #4a0080;">{{ product.title }}</h5>
                <p class="card-text" style="color: #7b2ff7; font-weight: 600;">
                  {{ product.price | currency }}
                </p>
                <div>
                  <ngb-rating [(rate)]="product.averageRating" 
                              [starTemplate]="t" [readonly]="true" max="5">
                  </ngb-rating>
                </div>
              </div>
            </div>
          </a>
        </div>
      </div>

      <!-- Pagination -->
      <ngb-pagination 
        [collectionSize]="category.totalProducts" 
        [pageSize]="10" 
        [(page)]="page" 
        (pageChange)="getProducts($event)">
      </ngb-pagination>

    </div>
  </div>
</section>

<!-- Star Rating Template -->
<ng-template #t let-fill="fill">
  <span *ngIf="fill === 100" class="star full">&#9733;</span>
  <span *ngIf="fill === 0" class="star">&#9733;</span>
  <span *ngIf="fill < 100 && fill > 0" class="star">
    <span class="half" [style.width.%]="fill">&#9733;</span>&#9733;
  </span>
</ng-template>
